debug: true


mesh:
  event_node:
    type: ZeroMQEventNode
    connect_sub: "tcp://pylon_auth:5010"
    connect_push: "tcp://pylon_auth:5011"
    topic: mesh
    hmac_key: mesh
    hmac_digest: sha512
    callback_workers: null
    mute_first_failed_connections: 10
    log_errors: true


autocreate_dbs:
  enabled: true
  db_url: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
  db_names: ["litellm", "agentstate"]


plugin_repo:
- type: elitea_github
  release: ${ELITEA_RELEASE}
  add_source_data: true
  add_head_data: true


preordered_plugins:
- worker_core
#
- sdk_plugin
- indexer_worker
#
- provider_worker
#
- runtime_engine_litellm
#
- tracing
